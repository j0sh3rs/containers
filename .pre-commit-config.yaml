---
# Pre-commit hooks for the containers repo.
# Install once:  pre-commit install --install-hooks --hook-type commit-msg
# Run on demand: pre-commit run --all-files
#
# These hooks mirror the CI checks in .github/workflows/pr.yaml (hadolint,
# shellcheck, actionlint) so failures surface locally before push, and add
# secret scanning, file hygiene, and Conventional Commit enforcement that CI
# does not currently cover.

minimum_pre_commit_version: "3.5.0"

default_install_hook_types:
  - pre-commit
  - commit-msg

# Ephemeral Claude Code session state churns constantly and is not source.
exclude: '^\.claude/'

repos:
  # --- File hygiene ---------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: check-yaml
        # GitHub Actions / multi-doc YAML may contain custom tags; allow them.
        args: [--allow-multiple-documents]
      - id: check-json

  # --- Secret scanning (CI does not do this) --------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # --- Dockerfile lint (mirrors pr.yaml hadolint job) -----------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        # Match CI: fail on warning and above.
        args: [--failure-threshold, warning]

  # --- Shell scripts (mirrors pr.yaml shellcheck job) -----------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        # Report diffs and write fixes; scripts use tab indentation.
        args: [-w, -d]

  # --- GitHub Actions workflows (mirrors pr.yaml actionlint job) ------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # --- YAML lint ------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  # --- Conventional Commits (CONTRIBUTING.md mandates this) -----------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - ci
          - docs
          - refactor
          - test
          - perf
          - build
          - style
          - revert
