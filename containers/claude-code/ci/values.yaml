---
container:
  name: claude-code
  image: ghcr.io/j0sh3rs/claude-code

upstream:
  source: npm
  package: "@anthropic-ai/claude-code"
  version: "2.1.191"

build:
  platforms:
    - linux/amd64
    - linux/arm64
  # NODE_VERSION is not declared here: the CI build no longer passes it as a
  # build-arg. The Dockerfile's Renovate-managed ARG NODE_VERSION default is the
  # single source of truth for the base image.
  args: {}

labels:
  org.opencontainers.image.title: "claude-code"
  org.opencontainers.image.description: "Containerized Claude Code CLI"
  org.opencontainers.image.source: "https://github.com/j0sh3rs/containers"
  org.opencontainers.image.licenses: "MIT"
