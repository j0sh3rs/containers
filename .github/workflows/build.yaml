---
name: Build Container

"on":
  workflow_call:
    inputs:
      container:
        description: "Container name (directory under containers/)"
        required: true
        type: string
      version:
        description: "Upstream version to tag the image"
        required: true
        type: string
      revision:
        description: "Image revision (increments on rebuild of same version)"
        required: false
        type: string
        default: "1"
    outputs:
      digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}
      image:
        description: "Full image reference with digest"
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    name: Build ${{ inputs.container }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: >-
            ghcr.io/${{ github.repository_owner }}/${{ inputs.container }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=${{ inputs.version }}-r${{ inputs.revision }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ inputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: containers/${{ inputs.container }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAUDE_CODE_VERSION=${{ inputs.version }}
            NODE_VERSION=lts
          cache-from: type=gha,scope=${{ inputs.container }}
          cache-to: type=gha,mode=max,scope=${{ inputs.container }}
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: >-
            ghcr.io/${{ github.repository_owner }}/${{ inputs.container }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with keyless cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
          CONTAINER: ${{ inputs.container }}
        run: |
          cosign sign --yes \
            "ghcr.io/${OWNER}/${CONTAINER}@${DIGEST}"
