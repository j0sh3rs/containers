---
name: Build and Release on Push

"on":
  push:
    branches:
      - main
    paths:
      - "containers/**"
  workflow_dispatch:
    inputs:
      container:
        description: "Container name to build (e.g. claude-code)"
        required: true
        type: string

# Serialize main-branch builds so two pushes cannot race the same revision
# counter. Queued runs wait rather than cancel — every push must build.
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changed containers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags: the revision counter below reads existing
          # release tags. A shallow clone without tags makes every build
          # compute r1.
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changed containers and read versions
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_CONTAINER: ${{ github.event.inputs.container }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            CHANGED="${DISPATCH_CONTAINER}"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              | grep '^containers/' \
              | cut -d/ -f2 \
              | sort -u)
          fi

          MATRIX="[]"
          for CONTAINER in $CHANGED; do
            VALUES="containers/${CONTAINER}/ci/values.yaml"
            if [[ ! -f "$VALUES" ]]; then
              echo "Skipping ${CONTAINER}: no values.yaml"
              continue
            fi
            VERSION=$(grep '^  version:' "$VALUES" \
              | awk '{print $2}' | tr -d '"')

            # Next revision = highest existing -rN for this version + 1.
            # Parsing the max (not counting tags) survives gaps and deletes;
            # a plain count would collide if any tag were ever removed.
            MAX=$(git tag --list "${CONTAINER}-${VERSION}-r*" \
              | sed -E "s/.*-r([0-9]+)$/\1/" \
              | grep -E '^[0-9]+$' \
              | sort -n | tail -1)
            REVISION=$(( ${MAX:-0} + 1 ))

            ENTRY=$(jq -n \
              --arg c "$CONTAINER" \
              --arg v "$VERSION" \
              --arg r "$REVISION" \
              '{container: $c, version: $v, revision: $r}')
            MATRIX=$(echo "$MATRIX" \
              | jq --argjson e "$ENTRY" '. + [$e]')
          done

          MATRIX=$(echo "$MATRIX" | jq -c '.')
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: ${MATRIX}"

  build:
    name: Build ${{ matrix.container }}
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/build.yaml
    with:
      container: ${{ matrix.container }}
      version: ${{ matrix.version }}
      revision: ${{ matrix.revision }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  release:
    name: Release ${{ matrix.container }}
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/release.yaml
    with:
      container: ${{ matrix.container }}
      version: ${{ matrix.version }}
      revision: ${{ matrix.revision }}
      digest: ${{ needs.build.outputs.digest }}
    permissions:
      contents: write
